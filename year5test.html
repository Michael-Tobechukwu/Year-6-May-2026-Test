<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Threats & Risks — Year 5 Test</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;800&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --blue-400:#378ADD;
  --blue-50:#E6F1FB;
  --blue-700:#185FA5;
  --bg:#F7F6F2;
  --text:#1C1C1A;
  --text-muted:#5F5E5A;
  --border:rgba(0,0,0,0.1);
  --border-md:rgba(0,0,0,0.18);
  --radius-lg:14px;
  --radius-xl:20px;
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);padding-bottom:4rem}

.hero{
  background:linear-gradient(135deg,#B5D4F4,#9FE1CB,#FAC775);
  padding:2rem 1.5rem;
}
.hero-inner{max-width:780px;margin:auto}
.hero-title{font-family:'Fredoka One',cursive;font-size:32px;color:#042C53}
.hero-sub{font-weight:600;color:var(--blue-700)}

.main{max-width:780px;margin:auto;padding:1.5rem}

.info-card{
  background:#fff;
  border:2px solid var(--blue-400);
  padding:1.5rem;
  border-radius:var(--radius-xl);
  margin-bottom:1.5rem;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border-md);
}

.q-card{
  background:#fff;
  border:1px solid var(--border);
  padding:1rem;
  border-radius:12px;
  margin-bottom:12px;
}

.q-num{font-size:12px;color:var(--text-muted);font-weight:700}
.q-text{margin:8px 0 10px;font-weight:600}

.opt-btn{
  width:100%;
  text-align:left;
  padding:10px;
  margin-bottom:6px;
  border:1px solid var(--border-md);
  border-radius:10px;
  background:#fff;
  cursor:pointer;
}

.opt-btn.selected{background:var(--blue-50);border-color:var(--blue-400)}

.submit-btn{
  width:100%;
  padding:15px;
  background:var(--blue-400);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-family:'Fredoka One';
  cursor:pointer;
}

.submit-btn:disabled{background:#ccc}

.status{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  font-weight:700;
  text-align:center;
}

.status.sending{background:#E6F1FB;color:#185FA5}
.status.success{background:#EAF3DE;color:#2d6a2d}
.status.error{background:#FCEBEB;color:#A32D2D}

.score-panel{display:none;max-width:780px;margin:auto;padding:1.5rem}
.score-card{background:#fff;padding:2rem;border-radius:20px;text-align:center}

</style>
</head>

<body>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-title">AI Threats & Risks Test</div>
    <div class="hero-sub">Year 6 · ICT & Digital Safety</div>
  </div>
</header>

<div class="main">

<div class="info-card">
  <label>Full Name</label>
  <input id="name">

  <label>Class</label>
  <select id="class">
    <option value="">Select Class</option>
    <option>Year 6 Emerald</option>
    <option>Year 6 Sapphire</option>
  </select>
</div>

<div id="quiz"></div>

<button class="submit-btn" id="submitBtn" onclick="submitTest()">Submit Test</button>

<div id="status" class="status"></div>

</div>

<div class="score-panel" id="scorePanel">
  <div class="score-card">
    <h2 id="result"></h2>
  </div>
</div>

<script>

// 🔴 PUT YOUR GOOGLE APPS SCRIPT URL HERE
const SCRIPT_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

const QUESTIONS = [
{q:"AI threats are different because AI systems can ____.",opts:["only work during the day","think and spread information quickly","stop without electricity","affect one person"],ans:1},
{q:"Which shows AI scaling?",opts:["One student lies","AI spreads info to millions quickly","Teacher writes notes","Student forgets password"],ans:1},
{q:"AI threats are often invisible means ____.",opts:["AI cannot be seen","happen secretly","works underground","screens go black"],ans:1},
{q:"Fake athlete video is ____.",opts:["AI hallucination","AI sycophancy","Deepfake","AI scaling"],ans:2},
{q:"Deepfake clue?",opts:["Clear sound","Unnatural face movement","Short video","Shared online"],ans:1},
{q:"AI hallucination is when AI ____.",opts:["refuses answers","creates false info","becomes aware","copies homework"],ans:1},
{q:"Why hallucination harmful?",opts:["wrong trust","less internet","stops computers","only games"],ans:0},
{q:"Most careful AI use?",opts:["alarm","movie","medical advice","music"],ans:2},
{q:"Chatbot agreeing wrongly is ____.",opts:["hallucination","bias","sycophancy","deepfake"],ans:2},
{q:"AI bias means ____.",opts:["always correct","unfair ideas","no internet","faster AI"],ans:1}
];

let answers={};

function build(){
const qDiv=document.getElementById("quiz");

QUESTIONS.forEach((q,i)=>{
let html=`<div class="q-card">
<div class="q-num">Question ${i+1}</div>
<div class="q-text">${q.q}</div>`;

q.opts.forEach((o,j)=>{
html+=`<button class="opt-btn" onclick="pick(${i},${j},this)">${String.fromCharCode(97+j)}. ${o}</button>`;
});

html+=`</div>`;
qDiv.innerHTML+=html;
});
}

function pick(q,i,el){
answers[q]=i;
el.parentNode.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("selected"));
el.classList.add("selected");
}

function submitTest(){

const name=document.getElementById("name").value.trim();
const cls=document.getElementById("class").value;

if(!name||!cls){
alert("Enter name and class");
return;
}

let score=0;
QUESTIONS.forEach((q,i)=>{
if(answers[i]===q.ans)score++;
});

const pct=Math.round((score/10)*100);

document.getElementById("scorePanel").style.display="block";
document.getElementById("result").innerText=`${name} scored ${score}/10 (${pct}%)`;

sendToSheet(name,cls,score,pct);
}

function sendToSheet(name,cls,score,pct){

const status=document.getElementById("status");
status.style.display="block";
status.className="status sending";
status.innerText="Sending results...";

const payload={
name:name,
studentClass:cls,
score:score,
pct:pct
};

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})
.then(()=>{
status.className="status success";
status.innerText="Results sent successfully!";
})
.catch(()=>{
status.className="status error";
status.innerText="Failed to send results.";
});
}

build();

</script>

</body>
</html>
